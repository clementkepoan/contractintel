services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./wiki:/app/wiki
      - huggingface-cache:/models/huggingface
    environment:
      - LOCAL_MODEL_BASE_URL=${LOCAL_MODEL_BASE_URL:-}
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-}
      - LOCAL_QUERY_MODEL_NAME=${LOCAL_QUERY_MODEL_NAME:-}
      - LOCAL_MODEL_API_KEY=${LOCAL_MODEL_API_KEY:-}
      - LOCAL_MODEL_NUM_CTX=${LOCAL_MODEL_NUM_CTX:-}
      - LOCAL_MODEL_ENABLE_THINKING=${LOCAL_MODEL_ENABLE_THINKING:-}
      - LOCAL_MODEL_TEMPERATURE=${LOCAL_MODEL_TEMPERATURE:-}
      - LOCAL_MODEL_TOP_P=${LOCAL_MODEL_TOP_P:-}
      - LOCAL_MODEL_TOP_K=${LOCAL_MODEL_TOP_K:-}
      - LOCAL_MODEL_MIN_P=${LOCAL_MODEL_MIN_P:-}
      - LOCAL_MODEL_PRESENCE_PENALTY=${LOCAL_MODEL_PRESENCE_PENALTY:-}
      - LOCAL_MODEL_REPETITION_PENALTY=${LOCAL_MODEL_REPETITION_PENALTY:-}
      - LOCAL_MODEL_FREQUENCY_PENALTY=${LOCAL_MODEL_FREQUENCY_PENALTY:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-}
      - EMBEDDING_MODEL_BASE_URL=${EMBEDDING_MODEL_BASE_URL:-}
      - EMBEDDING_MODEL_API_KEY=${EMBEDDING_MODEL_API_KEY:-}
      - RERANKER_MODEL_NAME=${RERANKER_MODEL_NAME:-}
      - RERANKER_MODEL_BASE_URL=${RERANKER_MODEL_BASE_URL:-}
      - RERANKER_MODEL_API_KEY=${RERANKER_MODEL_API_KEY:-}
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-}
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage

volumes:
  huggingface-cache:
  qdrant-storage:
