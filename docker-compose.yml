services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./wiki:/app/wiki
      - huggingface-cache:/models/huggingface
    environment:
      - LOCAL_MODEL_BASE_URL=${LOCAL_MODEL_BASE_URL:-http://host.docker.internal:11434/v1}
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-Qwen3.5-4B-MLX-4bit}
      - LOCAL_MODEL_API_KEY=${LOCAL_MODEL_API_KEY:-1111}
      - LOCAL_MODEL_NUM_CTX=${LOCAL_MODEL_NUM_CTX:-8192}
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-contract_chunks}
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage

volumes:
  huggingface-cache:
  qdrant-storage:
